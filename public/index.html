<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSI Dashboard — US Stocks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --dim: #475569;
      --accent: #6366f1;

      --ob-bg: rgba(239,68,68,.12);
      --ob-border: rgba(239,68,68,.45);
      --ob-rsi: #ef4444;
      --ob-badge-bg: rgba(239,68,68,.2);
      --ob-badge: #f87171;
      --ob-bar: #ef4444;

      --os-bg: rgba(34,197,94,.12);
      --os-border: rgba(34,197,94,.45);
      --os-rsi: #22c55e;
      --os-badge-bg: rgba(34,197,94,.2);
      --os-badge: #4ade80;
      --os-bar: #22c55e;

      --neu-bar: #6366f1;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 16px 16px 32px;
    }

    /* ── Header ────────────────────────────────────────────────────── */
    header {
      max-width: 1100px;
      margin: 0 auto 20px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 12px;
    }

    h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -.02em; }
    h1 span { color: var(--accent); }

    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

    /* countdown row */
    .countdown-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .78rem;
      color: var(--muted);
    }
    .bar-outer {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 80px;
    }
    .bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    button {
      cursor: pointer; border: none; border-radius: 8px;
      font-size: .82rem; font-weight: 600;
      padding: 8px 16px;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }
    button:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: .88; }

    /* ── Grid ──────────────────────────────────────────────────────── */
    #grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }
    @media (min-width: 560px)  { #grid { grid-template-columns: repeat(3, 1fr); } }
    @media (min-width: 760px)  { #grid { grid-template-columns: repeat(4, 1fr); gap: 14px; } }
    @media (min-width: 1000px) { #grid { grid-template-columns: repeat(5, 1fr); } }

    /* ── Card ──────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color .3s, background .3s;
    }
    .card.overbought { background: var(--ob-bg); border-color: var(--ob-border); }
    .card.oversold   { background: var(--os-bg); border-color: var(--os-border); }

    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 4px; }

    .card-ticker {
      font-size: .72rem; font-weight: 800;
      color: var(--muted); text-transform: uppercase; letter-spacing: .08em;
    }
    .card-name {
      font-size: .62rem; color: var(--dim); margin-top: 1px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* zone badge */
    .card-zone {
      font-size: .6rem; font-weight: 700;
      padding: 2px 8px; border-radius: 20px;
      letter-spacing: .06em; white-space: nowrap; flex-shrink: 0;
    }
    .card.overbought .card-zone { background: var(--ob-badge-bg); color: var(--ob-badge); }
    .card.oversold   .card-zone { background: var(--os-badge-bg); color: var(--os-badge); }
    .card.neutral    .card-zone { background: rgba(100,116,139,.2); color: var(--muted); }

    /* price + RSI */
    .card-price { font-size: .9rem; font-weight: 600; }

    .card-rsi {
      font-size: 2.6rem; font-weight: 800;
      line-height: 1; letter-spacing: -.04em;
    }
    .card.overbought .card-rsi { color: var(--ob-rsi); }
    .card.oversold   .card-rsi { color: var(--os-rsi); }
    .card.neutral    .card-rsi { color: var(--text); }

    /* RSI visual bar */
    .rsi-bar-wrap {
      position: relative;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: visible;
    }
    .rsi-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .5s ease;
    }
    .card.overbought .rsi-bar-fill { background: var(--ob-bar); }
    .card.oversold   .rsi-bar-fill { background: var(--os-bar); }
    .card.neutral    .rsi-bar-fill { background: var(--neu-bar); }

    /* zone markers at 30 and 70 */
    .rsi-bar-wrap::before,
    .rsi-bar-wrap::after {
      content: '';
      position: absolute;
      top: -2px; bottom: -2px;
      width: 1px;
      background: rgba(148,163,184,.3);
    }
    .rsi-bar-wrap::before { left: 30%; }
    .rsi-bar-wrap::after  { left: 70%; }

    .rsi-bar-labels {
      display: flex;
      justify-content: space-between;
      font-size: .55rem;
      color: var(--dim);
      margin-top: 2px;
      padding: 0 1px;
    }

    /* last updated */
    .card-updated {
      font-size: .62rem;
      color: var(--dim);
    }

    /* loading / error states */
    .card-idle   { font-size: .74rem; color: var(--dim); font-style: italic; }
    .card-error  { font-size: .7rem;  color: #f87171; line-height: 1.4; }

    /* skeleton */
    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, var(--border) 25%, #2e3248 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* spinner */
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid #475569; border-top-color: #a5b4fc;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Legend ────────────────────────────────────────────────────── */
    .legend {
      max-width: 1100px; margin: 20px auto 0;
      display: flex; gap: 18px; flex-wrap: wrap;
      font-size: .75rem; color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.red   { background: #ef4444; }
    .dot.green { background: #22c55e; }
    .dot.gray  { background: #6366f1; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>RSI <span>Dashboard</span></h1>
    <div class="header-right">
      <button class="btn-primary" id="refreshBtn" onclick="manualRefresh()">Refresh Now</button>
    </div>
  </div>
  <div class="countdown-row">
    <span>Next refresh in <strong id="countdownSec">300</strong>s</span>
    <div class="bar-outer"><div class="bar-inner" id="countdownBar" style="width:100%"></div></div>
  </div>
</header>

<div id="grid"></div>

<div class="legend">
  <span><span class="dot green"></span> RSI ≤ 30 — Oversold</span>
  <span><span class="dot gray"></span>  RSI 30–70 — Neutral</span>
  <span><span class="dot red"></span>   RSI ≥ 70 — Overbought</span>
  <span style="margin-left:auto;color:var(--dim)" id="globalUpdated"></span>
</div>

<script>
  const POLL_INTERVAL = 300; // seconds (5 min)
  const COOLDOWN      = 60;  // seconds

  let stocks      = [];
  let state       = {};      // symbol → data | {loading} | {error}
  let countdown   = POLL_INTERVAL;
  let cooldown    = 0;
  let countdownTm = null;
  let cooldownTm  = null;

  // ── Utilities ───────────────────────────────────────────────────────────────

  const esc = s => String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const fmtPrice = p =>
    (p != null) ? '$' + p.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—';

  function timeAgo(iso) {
    const secs = Math.floor((Date.now() - new Date(iso)) / 1000);
    if (secs < 60)   return `${secs}s ago`;
    if (secs < 3600) return `${Math.floor(secs/60)}m ago`;
    return `${Math.floor(secs/3600)}h ago`;
  }

  function zoneClass(zone) {
    if (zone === 'Overbought') return 'overbought';
    if (zone === 'Oversold')   return 'oversold';
    return 'neutral';
  }

  // ── Card renderer ───────────────────────────────────────────────────────────

  function renderCard(stock) {
    const { symbol, name } = stock;
    const d   = state[symbol];
    const id  = 'card-' + symbol;
    let cls   = 'neutral';
    let inner = '';

    if (!d) {
      inner = `<div class="card-idle">—</div>`;
    } else if (d.loading) {
      cls   = 'neutral';
      inner = `
        <div class="skeleton" style="height:12px;width:55px"></div>
        <div class="skeleton" style="height:42px;width:72px;margin:4px 0"></div>
        <div class="skeleton" style="height:6px;border-radius:3px"></div>`;
    } else if (d.error) {
      inner = `<div class="card-error">⚠ ${esc(d.error)}</div>`;
    } else {
      cls = zoneClass(d.zone);
      const pct  = Math.min(100, Math.max(0, d.rsi)).toFixed(1);
      inner = `
        <div class="card-price">${fmtPrice(d.price)}</div>
        <div class="card-rsi">${d.rsi != null ? d.rsi.toFixed(1) : '—'}</div>
        <div class="rsi-bar-wrap">
          <div class="rsi-bar-fill" style="width:${pct}%"></div>
        </div>
        <div class="rsi-bar-labels"><span>0</span><span>30</span><span>70</span><span>100</span></div>
        <div class="card-updated">${d.updatedAt ? timeAgo(d.updatedAt) : ''}</div>`;
    }

    const zoneBadge = (!d || d.loading || d.error)
      ? '' : `<span class="card-zone">${esc(d.zone)}</span>`;

    return `
      <div class="card ${cls}" id="${id}">
        <div class="card-header">
          <div>
            <div class="card-ticker">${esc(symbol)}</div>
            <div class="card-name">${esc(name)}</div>
          </div>
          ${zoneBadge}
        </div>
        ${inner}
      </div>`;
  }

  function renderAll() {
    document.getElementById('grid').innerHTML = stocks.map(s => renderCard(s)).join('');
  }

  function updateCard(symbol) {
    const el = document.getElementById('card-' + symbol);
    const stock = stocks.find(s => s.symbol === symbol);
    if (el && stock) el.outerHTML = renderCard(stock);
  }

  // ── Fetch ───────────────────────────────────────────────────────────────────

  async function fetchAll(force = false) {
    try {
      const url = force ? '/api/refresh' : '/api/rsi';
      const method = force ? 'POST' : 'GET';
      const res  = await fetch(url, { method });
      const json = await res.json();

      if (!res.ok) {
        // cooldown rejection
        if (res.status === 429 && json.wait) startCooldown(json.wait);
        throw new Error(json.error || `HTTP ${res.status}`);
      }

      const items = json.data ?? [];
      items.forEach(item => { state[item.symbol] = item; });
      renderAll();

      const ts = json.fetchedAt;
      if (ts) {
        document.getElementById('globalUpdated').textContent = 'Updated ' + new Date(ts).toLocaleTimeString();
      }

      // Refresh "X mins ago" labels every 30s
      clearInterval(window._agoTimer);
      window._agoTimer = setInterval(() => {
        stocks.forEach(s => {
          const d = state[s.symbol];
          if (d && d.updatedAt && !d.loading && !d.error) {
            const el = document.querySelector(`#card-${s.symbol} .card-updated`);
            if (el) el.textContent = timeAgo(d.updatedAt);
          }
        });
      }, 30000);

    } catch (err) {
      console.error('Fetch error:', err.message);
    }
  }

  // ── Manual refresh ──────────────────────────────────────────────────────────

  async function manualRefresh() {
    if (cooldown > 0) return;
    resetCountdown();
    await fetchAll(true);
    startCooldown(COOLDOWN);
  }

  function startCooldown(secs) {
    cooldown = secs;
    const btn = document.getElementById('refreshBtn');
    clearInterval(cooldownTm);
    cooldownTm = setInterval(() => {
      cooldown = Math.max(0, cooldown - 1);
      btn.textContent = cooldown > 0 ? `Wait ${cooldown}s` : 'Refresh Now';
      btn.disabled    = cooldown > 0;
      if (cooldown === 0) clearInterval(cooldownTm);
    }, 1000);
    btn.textContent = `Wait ${cooldown}s`;
    btn.disabled    = true;
  }

  // ── Countdown ───────────────────────────────────────────────────────────────

  function resetCountdown() {
    countdown = POLL_INTERVAL;
    clearInterval(countdownTm);
    countdownTm = setInterval(tickCountdown, 1000);
    updateCountdownUI();
  }

  function tickCountdown() {
    countdown = Math.max(0, countdown - 1);
    updateCountdownUI();
    if (countdown === 0) {
      clearInterval(countdownTm);
      fetchAll().then(() => resetCountdown());
    }
  }

  function updateCountdownUI() {
    document.getElementById('countdownSec').textContent = countdown;
    document.getElementById('countdownBar').style.width = (countdown / POLL_INTERVAL * 100) + '%';
  }

  // ── Init ────────────────────────────────────────────────────────────────────

  async function init() {
    try {
      const res = await fetch('/api/stocks');
      stocks = await res.json();

      // show skeletons immediately
      stocks.forEach(s => { state[s.symbol] = { loading: true }; });
      renderAll();

      await fetchAll();
      resetCountdown();
    } catch (err) {
      document.getElementById('grid').innerHTML =
        `<p style="color:#f87171;padding:16px;grid-column:1/-1">
           Failed to initialise: ${esc(err.message)}
         </p>`;
    }
  }

  init();
</script>
</body>
</html>
