<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSI Dashboard — NSE Stocks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;

      --overbought-bg: rgba(239, 68, 68, 0.12);
      --overbought-border: rgba(239, 68, 68, 0.45);
      --overbought-badge: #ef4444;

      --oversold-bg: rgba(34, 197, 94, 0.12);
      --oversold-border: rgba(34, 197, 94, 0.45);
      --oversold-badge: #22c55e;

      --neutral-badge: #64748b;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 auto 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .last-updated {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #refreshBtn {
      background: var(--accent);
      color: #fff;
    }

    #refreshBtn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ── Countdown ── */
    .countdown-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .countdown-label {
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .countdown-bar-outer {
      flex: 1;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      min-width: 80px;
    }

    .countdown-bar-inner {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* ── Status banner ── */
    #status {
      max-width: 900px;
      margin: 0 auto 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.82rem;
      display: none;
    }

    #status.error {
      display: block;
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.4);
      color: #fca5a5;
    }

    #status.loading {
      display: block;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #a5b4fc;
    }

    /* ── Grid ── */
    #grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px) {
      #grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
      h1 { font-size: 1.6rem; }
    }

    @media (min-width: 900px) {
      #grid { grid-template-columns: repeat(4, 1fr); }
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: border-color 0.3s, background 0.3s;
      position: relative;
      overflow: hidden;
    }

    .card.overbought {
      background: var(--overbought-bg);
      border-color: var(--overbought-border);
    }

    .card.oversold {
      background: var(--oversold-bg);
      border-color: var(--oversold-border);
    }

    .card.error-card {
      opacity: 0.55;
    }

    .card-name {
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-symbol {
      font-size: 0.65rem;
      color: #475569;
      margin-top: -4px;
    }

    .card-price {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-rsi {
      font-size: 2.6rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .card.overbought .card-rsi { color: #ef4444; }
    .card.oversold  .card-rsi { color: #22c55e; }
    .card.neutral   .card-rsi { color: var(--text); }

    .card-zone {
      display: inline-block;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      align-self: flex-start;
    }

    .card.overbought .card-zone {
      background: rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .card.oversold .card-zone {
      background: rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .card.neutral .card-zone {
      background: rgba(100, 116, 139, 0.2);
      color: var(--muted);
    }

    .card-error-msg {
      font-size: 0.72rem;
      color: #f87171;
    }

    /* ── Skeleton ── */
    .skeleton {
      border-radius: 8px;
      background: linear-gradient(90deg, var(--border) 25%, #2e3248 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-rsi  { height: 48px; width: 80px; margin: 4px 0; }
    .skeleton-zone { height: 22px; width: 90px; border-radius: 20px; }
    .skeleton-price{ height: 18px; width: 70px; }
    .skeleton-name { height: 14px; width: 100px; }

    /* ── Legend ── */
    .legend {
      max-width: 900px;
      margin: 18px auto 0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.red   { background: #ef4444; }
    .dot.green { background: #22c55e; }
    .dot.gray  { background: #64748b; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>RSI <span>Dashboard</span></h1>
    <div class="header-meta">
      <span class="last-updated" id="lastUpdated">—</span>
      <button id="refreshBtn" onclick="manualRefresh()">Refresh Now</button>
    </div>
  </div>
  <div class="countdown-bar-wrap">
    <span class="countdown-label">Next refresh in <strong id="countdownSec">60</strong>s</span>
    <div class="countdown-bar-outer">
      <div class="countdown-bar-inner" id="countdownBar" style="width:100%"></div>
    </div>
  </div>
</header>

<div id="status"></div>
<div id="grid"></div>

<div class="legend">
  <span><span class="dot green"></span> RSI ≤ 30 — Oversold</span>
  <span><span class="dot gray"></span> RSI 30–70 — Neutral</span>
  <span><span class="dot red"></span> RSI ≥ 70 — Overbought</span>
</div>

<script>
  const POLL_INTERVAL = 60;   // seconds
  let countdown = POLL_INTERVAL;
  let pollTimer = null;
  let countdownTimer = null;
  let isLoading = false;

  // ── Skeleton placeholders ─────────────────────────────────────────────────

  function renderSkeletons(count) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for (let i = 0; i < count; i++) {
      grid.insertAdjacentHTML('beforeend', `
        <div class="card neutral">
          <div class="skeleton skeleton-name"></div>
          <div class="skeleton skeleton-price" style="margin-top:4px"></div>
          <div class="skeleton skeleton-rsi"></div>
          <div class="skeleton skeleton-zone"></div>
        </div>`);
    }
  }

  // ── Card renderer ─────────────────────────────────────────────────────────

  function zoneClass(zone) {
    if (zone === 'Overbought') return 'overbought';
    if (zone === 'Oversold')   return 'oversold';
    return 'neutral';
  }

  function renderCards(data) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    data.forEach(stock => {
      if (stock.error) {
        grid.insertAdjacentHTML('beforeend', `
          <div class="card error-card neutral">
            <div class="card-name">${escHtml(stock.name || stock.symbol)}</div>
            <div class="card-symbol">${escHtml(stock.symbol)}</div>
            <div class="card-rsi">—</div>
            <div class="card-error-msg">⚠ ${escHtml(stock.error)}</div>
          </div>`);
        return;
      }
      const cls = zoneClass(stock.zone);
      const rsiDisplay = stock.rsi !== null ? stock.rsi.toFixed(1) : '—';
      grid.insertAdjacentHTML('beforeend', `
        <div class="card ${cls}">
          <div class="card-name">${escHtml(stock.name)}</div>
          <div class="card-symbol">${escHtml(stock.symbol)}</div>
          <div class="card-price">₹${formatPrice(stock.price)}</div>
          <div class="card-rsi">${rsiDisplay}</div>
          <div class="card-zone">${escHtml(stock.zone)}</div>
        </div>`);
    });
  }

  function formatPrice(p) {
    if (!p) return '—';
    return p.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ── Status banner ─────────────────────────────────────────────────────────

  function setStatus(msg, type) {
    const el = document.getElementById('status');
    el.className = type || '';
    el.textContent = msg;
  }

  function clearStatus() {
    const el = document.getElementById('status');
    el.className = '';
    el.style.display = 'none';
  }

  // ── Fetch & render ────────────────────────────────────────────────────────

  async function fetchData(showSkeleton = false) {
    if (isLoading) return;
    isLoading = true;
    document.getElementById('refreshBtn').disabled = true;

    if (showSkeleton) renderSkeletons(8);
    setStatus('Fetching latest RSI data…', 'loading');

    try {
      const res = await fetch('/api/rsi');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();

      renderCards(json.data);
      clearStatus();

      const d = new Date(json.fetchedAt);
      document.getElementById('lastUpdated').textContent =
        'Updated ' + d.toLocaleTimeString();

    } catch (err) {
      setStatus('Could not load data: ' + err.message, 'error');
    } finally {
      isLoading = false;
      document.getElementById('refreshBtn').disabled = false;
      resetCountdown();
    }
  }

  // ── Countdown ─────────────────────────────────────────────────────────────

  function resetCountdown() {
    countdown = POLL_INTERVAL;
    clearInterval(countdownTimer);
    countdownTimer = setInterval(tickCountdown, 1000);
    updateCountdownUI();
  }

  function tickCountdown() {
    countdown = Math.max(0, countdown - 1);
    updateCountdownUI();
    if (countdown === 0) {
      clearInterval(countdownTimer);
      fetchData();
    }
  }

  function updateCountdownUI() {
    document.getElementById('countdownSec').textContent = countdown;
    const pct = (countdown / POLL_INTERVAL) * 100;
    document.getElementById('countdownBar').style.width = pct + '%';
  }

  // ── Manual refresh ────────────────────────────────────────────────────────

  function manualRefresh() {
    clearInterval(countdownTimer);
    clearInterval(pollTimer);
    fetchData();
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  fetchData(true);
</script>
</body>
</html>
