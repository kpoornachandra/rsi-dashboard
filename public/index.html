<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSI Dashboard — NSE Stocks</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3d;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #6366f1;

      --overbought-bg: rgba(239, 68, 68, 0.12);
      --overbought-border: rgba(239, 68, 68, 0.45);

      --oversold-bg: rgba(34, 197, 94, 0.12);
      --oversold-border: rgba(34, 197, 94, 0.45);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── Header ── */
    header {
      max-width: 900px;
      margin: 0 auto 20px;
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .last-updated { font-size: 0.78rem; color: var(--muted); }

    /* ── Buttons ── */
    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 16px;
      transition: opacity 0.15s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover:not(:disabled) { color: var(--text); border-color: var(--muted); }

    /* ── Grid ── */
    #grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    @media (min-width: 640px)  { #grid { gap: 16px; } h1 { font-size: 1.6rem; } }
    @media (min-width: 900px)  { #grid { grid-template-columns: repeat(4, 1fr); } }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      transition: border-color 0.3s, background 0.3s;
    }

    .card.overbought { background: var(--overbought-bg); border-color: var(--overbought-border); }
    .card.oversold   { background: var(--oversold-bg);   border-color: var(--oversold-border); }

    .card-name {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-symbol { font-size: 0.63rem; color: #475569; margin-top: -2px; }

    .card-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 80px;
      justify-content: center;
    }

    .card-price { font-size: 0.95rem; font-weight: 600; color: var(--text); }

    .card-rsi {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
    }
    .card.overbought .card-rsi { color: #ef4444; }
    .card.oversold   .card-rsi { color: #22c55e; }

    .card-zone {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.05em;
      align-self: flex-start;
    }
    .card.overbought .card-zone { background: rgba(239,68,68,0.2); color: #f87171; }
    .card.oversold   .card-zone { background: rgba(34,197,94,0.2); color: #4ade80; }
    .card.neutral    .card-zone { background: rgba(100,116,139,0.2); color: var(--muted); }

    .card-error {
      font-size: 0.7rem;
      color: #f87171;
      line-height: 1.4;
      word-break: break-word;
    }

    .card-idle {
      font-size: 0.75rem;
      color: #475569;
      font-style: italic;
    }

    /* ── Per-card fetch button ── */
    .card-fetch-btn {
      margin-top: 6px;
      width: 100%;
      padding: 7px 0;
      font-size: 0.76rem;
      font-weight: 600;
      border-radius: 8px;
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
      transition: background 0.15s, color 0.15s;
    }
    .card-fetch-btn:hover:not(:disabled) {
      background: rgba(99,102,241,0.22);
      color: #c7d2fe;
    }
    .card-fetch-btn.loading {
      color: #64748b;
      background: rgba(99,102,241,0.06);
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #475569;
      border-top-color: #a5b4fc;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Skeleton ── */
    .skeleton {
      border-radius: 6px;
      background: linear-gradient(90deg, var(--border) 25%, #2e3248 50%, var(--border) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Legend ── */
    .legend {
      max-width: 900px;
      margin: 18px auto 0;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      font-size: 0.75rem;
      color: var(--muted);
    }
    .legend span { display: flex; align-items: center; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .dot.red   { background: #ef4444; }
    .dot.green { background: #22c55e; }
    .dot.gray  { background: #64748b; }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>RSI <span>Dashboard</span></h1>
    <div class="header-actions">
      <span class="last-updated" id="lastUpdated"></span>
      <button class="btn-ghost" id="fetchAllBtn" onclick="fetchAll()">Fetch All</button>
    </div>
  </div>
</header>

<div id="grid"></div>

<div class="legend">
  <span><span class="dot green"></span> RSI ≤ 30 — Oversold</span>
  <span><span class="dot gray"></span> RSI 30–70 — Neutral</span>
  <span><span class="dot red"></span> RSI ≥ 70 — Overbought</span>
</div>

<script>
  // State: symbol → stock data or null
  const state = {};
  let stocks = [];

  // ── Helpers ───────────────────────────────────────────────────────────────

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function formatPrice(p) {
    if (!p && p !== 0) return '—';
    return '₹' + p.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function zoneClass(zone) {
    if (zone === 'Overbought') return 'overbought';
    if (zone === 'Oversold')   return 'oversold';
    return 'neutral';
  }

  // ── Render a single card ─────────────────────────────────────────────────

  function renderCard(stock) {
    const { symbol, name } = stock;
    const data = state[symbol];
    const id = 'card-' + symbol.replace(/\./g, '-');

    let bodyHtml = '';
    let cardClass = 'neutral';

    if (!data) {
      bodyHtml = `<div class="card-idle">Click below to fetch RSI</div>`;
    } else if (data.loading) {
      bodyHtml = `
        <div class="skeleton" style="height:14px;width:60px"></div>
        <div class="skeleton" style="height:44px;width:80px;margin:4px 0"></div>
        <div class="skeleton" style="height:22px;width:90px;border-radius:20px"></div>`;
    } else if (data.error) {
      bodyHtml = `<div class="card-error">⚠ ${esc(data.error)}</div>`;
    } else {
      cardClass = zoneClass(data.zone);
      bodyHtml = `
        <div class="card-price">${formatPrice(data.price)}</div>
        <div class="card-rsi">${data.rsi !== null ? data.rsi.toFixed(1) : '—'}</div>
        <div class="card-zone">${esc(data.zone)}</div>`;
    }

    const btnLabel = data && data.loading
      ? `<span class="spinner"></span>Fetching…`
      : data && !data.error ? 'Refresh' : 'Fetch RSI';

    return `
      <div class="card ${cardClass}" id="${id}">
        <div class="card-name">${esc(name)}</div>
        <div class="card-symbol">${esc(symbol)}</div>
        <div class="card-body">${bodyHtml}</div>
        <button class="card-fetch-btn ${data && data.loading ? 'loading' : ''}"
                ${data && data.loading ? 'disabled' : ''}
                onclick="fetchOne('${symbol}')">
          ${btnLabel}
        </button>
      </div>`;
  }

  function renderAll() {
    const grid = document.getElementById('grid');
    grid.innerHTML = stocks.map(s => renderCard(s)).join('');
  }

  function updateCard(symbol) {
    const id = 'card-' + symbol.replace(/\./g, '-');
    const el = document.getElementById(id);
    const stock = stocks.find(s => s.symbol === symbol);
    if (el && stock) {
      el.outerHTML = renderCard(stock);
    }
  }

  // ── Fetch one stock ───────────────────────────────────────────────────────

  async function fetchOne(symbol) {
    state[symbol] = { loading: true };
    updateCard(symbol);

    try {
      const res = await fetch(`/api/rsi/${encodeURIComponent(symbol)}`);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || `HTTP ${res.status}`);
      state[symbol] = json;
    } catch (err) {
      state[symbol] = { error: err.message };
    }

    updateCard(symbol);
    updateLastUpdated();
  }

  // ── Fetch all sequentially ────────────────────────────────────────────────

  async function fetchAll() {
    const btn = document.getElementById('fetchAllBtn');
    btn.disabled = true;
    btn.textContent = 'Fetching…';

    for (const s of stocks) {
      await fetchOne(s.symbol);
    }

    btn.disabled = false;
    btn.textContent = 'Fetch All';
  }

  function updateLastUpdated() {
    const el = document.getElementById('lastUpdated');
    el.textContent = 'Updated ' + new Date().toLocaleTimeString();
  }

  // ── Init ──────────────────────────────────────────────────────────────────

  async function init() {
    try {
      const res = await fetch('/api/stocks');
      stocks = await res.json();
      renderAll();
    } catch (err) {
      document.getElementById('grid').innerHTML =
        `<p style="color:#f87171;padding:16px">Failed to load stock list: ${esc(err.message)}</p>`;
    }
  }

  init();
</script>
</body>
</html>
